services:
  digistock:
    build: .
    image: digistock:latest

    # ── Interactive terminal (required for TUI and streaming output) ──
    stdin_open: true
    tty: true

    # ── API keys — copy .env.example to .env and fill in your keys ──
    env_file:
      - .env

    # ── Run the TUI by default; override for direct commands: ──
    #   docker compose run --rm digistock analyze "Should I buy TCS?"
    #   docker compose run --rm digistock indicators TCS
    #   docker compose run --rm digistock health
    command: [ "tui" ]
